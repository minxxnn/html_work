<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      height: 100px;
      border: 4px solid black;
    }
    .container .item {
      width: 100px;
      height: 100px;
      background-color: royalblue;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      opacity: 0;
      transition: 1s;
    }

    .container .item:hover{
      opacity: 1;
      background-color: orange;
      transform: rotate(45deg);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item">
      animation
    </div>
  </div>
</body>
</html>
