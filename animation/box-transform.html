<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      height: 100px;
      border: 4px solid black;
    }
    .container .item {
      width: 100px;
      height: 100px;
      background-color: royalblue;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      border-radius: 50%;
      transition: 1s;
      opacity: 1;
      transform: 
        rotate(45deg)
        translateX(50px)
        translateY(50px)
        scale(1.5);
    }
    </style>
</head>
<body>
  <div class="container">
    <div class="item">
      box
    </div>
  </div>
</body>
</html>
